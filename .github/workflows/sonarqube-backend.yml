name: SonarQube Back-end

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonar-backend:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'back-end/pnpm-lock.yaml'

      - name: Setup Java
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Check Java version
        run: java -version

      - name: Instalar dependencias
        run: pnpm install
        working-directory: back-end

      - name: Construir backend
        run: pnpm build
        working-directory: back-end

      - name: Ejecutar tests con cobertura
        run: pnpm test:cov
        working-directory: back-end

      - name: Descargar SonarQube Scanner CLI
        run: |
          curl -sSLo sonar-scanner-cli.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.0.0.4432.zip
          unzip sonar-scanner-cli.zip
        working-directory: back-end

      - name: Analizar backend en SonarQube
        run: |
          ./sonar-scanner-6.0.0.4432/bin/sonar-scanner \
            -Dsonar.projectKey=gestion_pruebas_backend \
            -Dsonar.projectName=gestion_pruebas_backend \
            -Dsonar.sources=src \
            -Dsonar.exclusions=**/node_modules/** \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }} \
            -Dsonar.token=${{ env.SONAR_TOKEN }}
        working-directory: back-end