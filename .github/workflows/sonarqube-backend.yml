name: SonarQube Back-end

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonar-backend:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install
        working-directory: back-end

      - name: Construir backend
        run: pnpm build
        working-directory: back-end

      - name: Descargar SonarQube Scanner CLI
        run: |
          curl -sSLo sonar-scanner-cli.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
          unzip sonar-scanner-cli.zip

      - name: Analizar backend en SonarQube
        run: |
          ./sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner \
            -Dsonar.projectKey=gestion_pruebas_backend \
            -Dsonar.projectName=gestion_pruebas_backend \
            -Dsonar.sources=src \
            -Dsonar.exclusions=**/node_modules/** \
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }} \
            -Dsonar.login=${{ env.SONAR_TOKEN }}
        working-directory: back-end
